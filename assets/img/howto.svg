<svg viewBox="0 0 1512 798" xmlns="http://www.w3.org/2000/svg" font-family="'Syne','DM Sans',sans-serif">
  <rect width="1512" height="798" fill="#0f1117"/>

  <!-- badge -->
  <rect x="509" y="30" width="138" height="24" rx="6" fill="#4f6df5"/>
  <text x="578" y="46" fill="#0f1117" font-size="12" font-weight="800" letter-spacing="2" text-anchor="middle">QUIZMASTER PRO</text>

  <!-- theme toggle -->
  <circle cx="987" cy="42" r="16" fill="#232734"/>
  <text x="987" y="47" font-size="14" text-anchor="middle">☀️</text>

  <!-- heading -->
  <text x="509" y="115" fill="#f1f2f6" font-size="60" font-weight="800">Think</text>
  <text x="509" y="180" fill="#f1f2f6" font-size="60" font-weight="800">you've got</text>
  <text x="509" y="245" fill="#4f6df5" font-size="60" font-weight="800" font-style="italic">what it takes?</text>

  <!-- subtitle -->
  <text x="509" y="295" fill="#9398ab" font-size="17" font-family="'DM Sans',sans-serif">Answer 10 questions, race against the clock, and climb the</text>
  <text x="509" y="320" fill="#9398ab" font-size="17" font-family="'DM Sans',sans-serif">leaderboard.</text>

  <!-- step cards -->
  <g font-family="'DM Sans',sans-serif">
    <!-- card 1 -->
    <rect x="509" y="365" width="123" height="190" rx="10" fill="#1a1d27"/>
    <text x="525" y="400" fill="#4f6df5" font-size="22" font-weight="800" font-family="'Syne',sans-serif">01</text>
    <text x="525" y="428" fill="#f1f2f6" font-size="14" font-weight="700">Pick a category</text>
    <text x="525" y="452" fill="#9398ab" font-size="11">Choose from General</text>
    <text x="525" y="468" fill="#9398ab" font-size="11">Knowledge, Science,</text>
    <text x="525" y="484" fill="#9398ab" font-size="11">History, Geography,</text>
    <text x="525" y="500" fill="#9398ab" font-size="11">Sports, Entertainment,</text>
    <text x="525" y="516" fill="#9398ab" font-size="11">Computers and Maths.</text>

    <!-- card 2 -->
    <rect x="643" y="365" width="123" height="190" rx="10" fill="#1a1d27"/>
    <text x="659" y="400" fill="#4f6df5" font-size="22" font-weight="800" font-family="'Syne',sans-serif">02</text>
    <text x="659" y="428" fill="#f1f2f6" font-size="14" font-weight="700">Race the clock</text>
    <text x="659" y="452" fill="#9398ab" font-size="11">Each question has a</text>
    <text x="659" y="468" fill="#9398ab" font-size="11">20-second timer.</text>
    <text x="659" y="484" fill="#9398ab" font-size="11">Answer fast for bonus</text>
    <text x="659" y="500" fill="#9398ab" font-size="11">points — the quicker</text>
    <text x="659" y="516" fill="#9398ab" font-size="11">you answer, the more.</text>

    <!-- card 3 -->
    <rect x="777" y="365" width="123" height="190" rx="10" fill="#1a1d27"/>
    <text x="793" y="400" fill="#4f6df5" font-size="22" font-weight="800" font-family="'Syne',sans-serif">03</text>
    <text x="793" y="428" fill="#f1f2f6" font-size="14" font-weight="700">Instant feedback</text>
    <text x="793" y="452" fill="#9398ab" font-size="11">See right away if</text>
    <text x="793" y="468" fill="#9398ab" font-size="11">you're correct. At the</text>
    <text x="793" y="484" fill="#9398ab" font-size="11">end you get a full</text>
    <text x="793" y="500" fill="#9398ab" font-size="11">breakdown of every</text>
    <text x="793" y="516" fill="#9398ab" font-size="11">answer with reasons.</text>

    <!-- card 4 -->
    <rect x="911" y="365" width="123" height="190" rx="10" fill="#1a1d27"/>
    <text x="927" y="400" fill="#4f6df5" font-size="22" font-weight="800" font-family="'Syne',sans-serif">04</text>
    <text x="927" y="428" fill="#f1f2f6" font-size="14" font-weight="700">Beat the board</text>
    <text x="927" y="452" fill="#9398ab" font-size="11">Your score is saved</text>
    <text x="927" y="468" fill="#9398ab" font-size="11">to the local</text>
    <text x="927" y="484" fill="#9398ab" font-size="11">leaderboard. Try</text>
    <text x="927" y="500" fill="#9398ab" font-size="11">different categories</text>
    <text x="927" y="516" fill="#9398ab" font-size="11">to top every table.</text>
  </g>

  <!-- setup card -->
  <rect x="509" y="582" width="525" height="150" rx="12" fill="#1a1d27"/>

  <g font-family="'DM Sans',sans-serif">
    <!-- name field -->
    <text x="529" y="615" fill="#9398ab" font-size="11" letter-spacing="1">YOUR NAME</text>
    <rect x="529" y="625" width="140" height="38" rx="8" fill="#232734"/>
    <text x="541" y="649" fill="#9398ab" font-size="13">Enter your name…</text>

    <!-- category field -->
    <text x="689" y="615" fill="#9398ab" font-size="11" letter-spacing="1">CATEGORY</text>
    <rect x="689" y="625" width="160" height="38" rx="8" fill="#232734"/>
    <text x="701" y="649" fill="#f1f2f6" font-size="13" font-weight="600">General Knowledge</text>

    <!-- difficulty field -->
    <text x="869" y="615" fill="#9398ab" font-size="11" letter-spacing="1">DIFFICULTY</text>
    <rect x="869" y="625" width="120" height="38" rx="8" fill="#232734"/>
    <text x="881" y="649" fill="#f1f2f6" font-size="13" font-weight="600">Any</text>
  </g>

  <!-- start button -->
  <rect x="529" y="682" width="160" height="40" rx="20" fill="#4f6df5"/>
  <text x="609" y="707" fill="#0f1117" font-size="14" font-weight="700" font-family="'Syne',sans-serif" text-anchor="middle">Start Quiz →</text>

  <!-- footer -->
  <text x="756" y="775" fill="#9398ab" font-size="12" font-family="'DM Sans',sans-serif" text-anchor="middle">Questions provided by Open Trivia DB · Fonts by Google Fonts · Built by Amir Shahsavari</text>
</svg>
